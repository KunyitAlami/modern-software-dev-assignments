<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Blue Paw Tasks (FastAPI Task Manager)</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body
        class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen font-sans"
    >
        <div class="max-w-3xl mx-auto py-10 px-6">
            <div class="text-center mb-10">
                <h1
                    class="text-4xl font-bold text-blue-700 flex justify-center items-center gap-2"
                >
                    🐾 Blue Paw Tasks (FastAPI Task Manager)
                </h1>
                <p class="text-blue-500 mt-2">
                    Manage your adorable pet shop tasks
                </p>
            </div>

            <div
                class="bg-white p-6 rounded-2xl shadow-lg border border-blue-100 mb-8"
            >
                <h2 class="text-xl font-semibold text-blue-700 mb-4">
                    Add Pet Task
                </h2>

                <form action="/add" method="post" class="space-y-4">
                    <input
                        type="text"
                        name="title"
                        placeholder="What needs to be done? (ex: Feed the kittens)"
                        required
                        class="w-full p-3 rounded-lg border border-blue-200 focus:ring-2 focus:ring-blue-400 outline-none"
                    />

                    <textarea
                        name="description"
                        placeholder="Add details (optional)"
                        class="w-full p-3 rounded-lg border border-blue-200 focus:ring-2 focus:ring-blue-400 outline-none"
                    ></textarea>

                    <button
                        type="submit"
                        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-semibold transition"
                    >
                        Add Task
                    </button>
                </form>
            </div>

            <div class="space-y-4">
                {% for task in tasks %}

                <div
                    class="bg-white border border-blue-100 rounded-xl p-4 shadow-sm flex justify-between items-center"
                >
                    <div>
                        <p class="font-semibold text-blue-800">
                            {{ task.title }}
                        </p>

                        <p class="text-sm text-blue-500">
                            {{ task.description }}
                        </p>
                    </div>

                    <div class="flex gap-3">
                        <a
                            href="/edit/{{task.id}}"
                            class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-sm hover:bg-blue-200"
                        >
                            Edit
                        </a>

                        <a
                            href="/delete/{{task.id}}"
                            class="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm hover:bg-red-200"
                        >
                            Delete
                        </a>
                    </div>
                </div>

                {% endfor %}
            </div>
        </div>
    </body>
</html>
