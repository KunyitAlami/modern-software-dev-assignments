<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Edit Task</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body class="bg-blue-50 min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
            <a
                href="/"
                class="w-full text-center bg-blue-700 text-white px-2 py-1 rounded-lg font-semibold mb-2"
            >
                Back
            </a>
            <h2 class="text-2xl font-bold text-blue-700 mb-6 mt-4">
                Edit Task
            </h2>

            <form action="/update/{{task.id}}" method="post" class="space-y-4">
                <input
                    type="text"
                    name="title"
                    value="{{task.title}}"
                    class="w-full p-3 rounded-lg border border-blue-200 focus:ring-2 focus:ring-blue-400 outline-none"
                />

                <textarea
                    name="description"
                    class="w-full p-3 rounded-lg border border-blue-200 focus:ring-2 focus:ring-blue-400 outline-none"
                >
{{task.description}}</textarea
                >

                <button
                    type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-semibold"
                >
                    Update Task
                </button>
            </form>
        </div>
    </body>
</html>
